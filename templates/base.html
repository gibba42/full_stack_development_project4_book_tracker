{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <title>Book Tracker</title>
</head>
<body>
    <header class="site-header">
        <nav class="nav-container" aria-label="Main navigation">
            <a href="{% url 'index' %}" class="logo">
                <span>Book Tracker</span>
            </a>

            <ul class="nav-links">
                <li><a class="nav-link" href="{% url 'index' %}">Home</a></li>
                <li><a class="nav-link" href="{% url 'book_search' %}">Seach Books</a></li>
                <li><a class="nav-link" href="{% url 'register' %}">Register</a></li>
            </ul>

            <div class="nav-auth">
                {% if user.is_authenticated %}
                    <a class="btn btn-dark" href="{% url 'my_library' %}">My Library</a>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit">Log out</button>
                    </form>
                {% else %}
                    <a class="btn btn-dark" href="{% url 'login' %}">Sign In</a>
                {% endif %}
            </div>
        </nav>
    </header>

    {% if messages %}
        <section aria-label="Site messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </section>
    {% endif %}

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
