{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h1>Edit Note</h1>
    <p>Update your note for {{ book.title }}.</p>
</section>

<section class="book-section">
    <form method="POST" class="book-form">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="button-row">
            <button type="submit" class="button-link">
                Save Note
            </button>

            <a href="{% url 'book_detail' book.id %}" class="button-link">
                Cancel
            </a>
        </div>
    </form>
</section>

{% endblock %}
